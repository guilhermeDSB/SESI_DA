<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./styles.css">
    <title>PetShop</title>
</head>

<body>

    <header class="menu">
        <img src="./img/perfil.png" alt="Não foi possivel carregar a imagem!">

        <h1>Encontre tudo para o seu pet</h1>

        <p>PetShop</p>
    </header>

    <div class="campo-pesquisa">
        <input type="text" placeholder="Pesquisar">
    </div>

    <div class="grupo-card">
        <div class="card" style="background-image: url(./img/gato.jpg);">
            <p>gatos</p>
        </div>
        <div class="card" style="background-image: url(./img/cachorro.jpg);">
            <p>cachorros</p>
        </div>
        <div class="card" style="background-image: url(./img/ave.png);">
            <p>aves</p>
        </div>
        <div class="card" style="background-image: url(./img/peixe.png);">
            <p>peixes</p>
        </div>
    </div>
    <div class="promo">
    <div class="promo-texto">
        <h2>Torne-se um membro<br>Ganhe um desconto</h2>
        <button>Juntar-se</button>
    </div>

    <div class="promo-img">
        <img src="./img/gato_laranja.jpg" alt="Gato">
    </div>
</div>
    <div class="menu-final">
        <p>Copyright 2024 - Todos os direitos reservados</p>
        <p>Desenvolvido por SESI DA</p>
    </div>
</body>

</html>
